name: clawith
description: "Clawith - Enterprise Digital Employee Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Routing
  go_router: ^14.8.1
  # HTTP
  dio: ^5.7.0
  # WebSocket
  web_socket_channel: ^3.0.2
  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  # Markdown
  flutter_markdown: ^0.7.6
  # URL launcher
  url_launcher: ^6.3.1
  # File picker
  file_picker: ^8.1.7
  # Image picker (for chat uploads)
  image_picker: ^1.1.2
  # Intl for date formatting
  intl: ^0.19.0
  # JSON
  json_annotation: ^4.9.0
  # Mime type
  mime: ^2.0.0
  # Path
  path: ^1.9.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  # Game engine for virtual office
  bonfire: ^3.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4

dependency_overrides:
  # Patched bonfire to fix Flame 1.36+ RenderGameWidget 'behavior' parameter
  bonfire:
    path: local_packages/bonfire

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/office/
    - assets/images/player/
    - assets/images/npc/
    - assets/images/tiled/
